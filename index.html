<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotify ka clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

   
    <div class="songlist">
        <ul> </ul>
    </div>


    
    <div class="playlists">
        <h1>Spotify playlists</h1>
        <div class="cardcontainer">
            <div data-folder="playlist1" class="card">
                <img src="man.jpg" alt="">
                <h2>Happy Hits</h2>
                <p>Hits to boost your mood and fill you with happiness!</p>
            </div>

            <div data-folder="playlist2" class="card">
                <img src="man.jpg" alt="">
                <h2>Happy Hits</h2>
                <p>Hits to boost your mood and fill you with happiness!</p>
            </div>
        </div>



        <div class="playbar">
        <div class="seekbar">
            <div class="circle"></div>
        </div>
        
            <div class="songinfo"></div>
        <div class="songbuttons">
            <img id="previous" src="previous-stroke-rounded.svg" alt="">
            <img id="play" src="pause.svg" alt="">
            <img id="next" src="next-stroke-rounded.svg" alt="">
        </div>
        <div class="songtime"></div>
        <div class="volume">
            <input type="range" name="volume">
            <img src="volume.svg" alt="">
        </div>
    </div>



    </div>




    


 </div>

    <script src="script.js"></script>
</body>
</html>
